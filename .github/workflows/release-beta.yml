name: Release Beta
on:
  push:
    branches: [beta]
    paths:
      - 'packages/**'
      - '.changeset/**'
      - '.github/workflows/release-beta.yml'

jobs:
  release-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git user
        run: |
          git config --global user.name "hollow_orld"

      - name: Install Pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm -r --filter=vite-plugin-image-tools build

      - name: Check pre mode
        id: pre
        run: |
          if [ -f .changeset/pre.json ] && grep -q '"mode": "pre"' .changeset/pre.json; then
            echo "in_pre=true" >> $GITHUB_OUTPUT
          else
            echo "in_pre=false" >> $GITHUB_OUTPUT
          fi

      - name: Enter prerelease mode
        if: steps.pre.outputs.in_pre != 'true'
        run: pnpm changeset pre enter beta

      - name: Setup Changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "[ci] Version Packages"
          title: "Version Packages (GitHub Actions)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Packages
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Exit prerelease mode
        run: pnpm changeset pre exit
